<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex">
<title>お申込みページ</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Noto Sans JP",sans-serif;
    background:#f5f5f7;
    min-height:100dvh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:24px;
  }
  .apply-btn{
    appearance:none;
    border:none;
    cursor:pointer;
    background:#e60012;            /* 赤 */
    color:#fff;
    font-size:18px;
    font-weight:800;
    letter-spacing:.03em;
    padding:20px 46px;
    border-radius:12px;
    box-shadow:0 10px 24px -10px rgba(230,0,18,.7);
    transition:transform .08s ease, background .15s ease;
  }
  .apply-btn:hover{background:#c8000f;}
  .apply-btn:active{transform:translateY(2px);}
  .apply-btn:focus-visible{outline:3px solid #1c2230;outline-offset:3px;}
</style>
</head>
<body>
 
  <!-- ============================================================
       ▼ 公演ごとに書き換えるのはこの2つだけ
         1) form の action   = 申込先URL
         2) CERK の value     = その先行のトークン
       （どちらも公式申込ページのフォームからそのままコピー）
  ============================================================ -->
  <form action="https://l-tike.com/st1/2hmzyg8o7d9rw0d25x2q" method="POST">
    <input type="hidden" name="CERK" value="77d1918d2c9d264d4202092555352c5f">
    <button type="submit" class="apply-btn">お申込みはこちら</button>
  </form>
 
</body>
</html>
